# SPDX-License-Identifier: GPL-3.0-or-later
#
# REUSE coverage for files that cannot carry inline SPDX headers (locks,
# archives, generated artifacts) and for the repo's documentation set, which
# self-declares GPL-3.0-or-later (see PRD.md masthead). All hand-written
# .nix/.rs/.toml sources carry inline headers instead (Standard §4.3).
version = 1

[[annotations]]
path = [
    "*.md",
    "v0/**",
    "v0.zip",
    "*.docx",
    "*.txt",
    "LICENSE",
    ".gitignore",
    ".gitattributes",
    ".github/**",
    "flake.lock",
    "flakes/rapg/flake.lock",
    "pkgs/steelbore-audio-led/Cargo.lock",
    "home.nix",
    "system.nix",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Mohamed Hammad <Mohamed.Hammad@SpacecraftSoftware.org>"
SPDX-License-Identifier = "GPL-3.0-or-later"

# Hand-written sources carry SPDX-License-Identifier inline; this stanza
# supplies the copyright holder for them (aggregate = merged with the
# in-file license tag), avoiding a 50-file header churn.
[[annotations]]
path = [
    "**/*.nix",
    "pkgs/steelbore-audio-led/src/**",
    "pkgs/steelbore-audio-led/Cargo.toml",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Mohamed Hammad <Mohamed.Hammad@SpacecraftSoftware.org>"
